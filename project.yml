name: TwoTapGame
options:
  bundleIdPrefix: com.ufuk
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "99H9NJ6Z6J"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
    INFOPLIST_KEY_UIRequiresFullScreen: true


targets:
  TwoTapGame:
    type: application
    platform: iOS
    sources:
      - path: TwoTapGame
        excludes:
          - "**/.DS_Store"
    resources:
      - path: TwoTapGame/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ufuk.twotapgame
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "2TAP"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: TwoTapGame/TwoTapGame.entitlements
      properties:
        com.apple.developer.game-center: true
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: AVFoundation.framework
      - sdk: GameKit.framework

  TwoTapGameTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TwoTapGameTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TwoTapGame

  TwoTapGameUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TwoTapGameUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TwoTapGame

schemes:
  TwoTapGame:
    build:
      targets:
        TwoTapGame: all
        TwoTapGameTests: [test]
        TwoTapGameUITests: [test]
    run:
      config: Debug
    test:
      targets:
        - TwoTapGameTests
        - TwoTapGameUITests
